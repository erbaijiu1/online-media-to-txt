services:
  media-converter:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-converter
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server/app:/app/app
      - ./temp_audio:/app/temp_audio
    restart: unless-stopped
