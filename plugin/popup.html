<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; }
    input { width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    #status { margin-top: 10px; font-size: 12px; color: #666; }
    .url-list { max-height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 5px; margin-bottom: 10px; }
    .url-item { font-size: 11px; word-break: break-all; margin-bottom: 5px; cursor: pointer; color: blue; }
  </style>
</head>
<body>
  <h3>音频同步配置</h3>
  <label>Joplin 路径:</label>
  <input type="text" id="joplinPath" placeholder="例如: Project/stock/直播" value="Project/stock/不惑少年/直播">

  <label>笔记标题 (Alias):</label>
  <input type="text" id="noteTitle">

  <label>检测到的 MP3:</label>
  <div id="urlList" class="url-list">正在扫描...</div>

  <button id="sendBtn">发送到后端处理</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
