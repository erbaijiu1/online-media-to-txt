<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e9ecef;
    }
    .header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .header .icon { font-size: 22px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1);
    }

    .url-list {
      max-height: 140px;
      overflow-y: auto;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 6px;
      margin-top: 4px;
      background: #fff;
    }
    .url-item {
      font-size: 11px;
      word-break: break-all;
      padding: 6px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      cursor: pointer;
      color: #495057;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .url-item:last-child { margin-bottom: 0; }
    .url-item:hover {
      background: #e7f3ff;
    }
    .url-item.selected {
      background: #d0e8ff;
      border-color: #4a6cf7;
      color: #1a1a2e;
      font-weight: 500;
    }
    .url-empty {
      font-size: 12px;
      color: #adb5bd;
      text-align: center;
      padding: 16px 8px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      cursor: pointer;
      background: linear-gradient(135deg, #4a6cf7, #6366f1);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: linear-gradient(135deg, #3b5de7, #5457e1);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
    }
    .btn:active { transform: translateY(0); }
    .btn:disabled {
      background: #adb5bd;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }
    #status.info { display: block; background: #e7f3ff; color: #1a1a2e; }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    #status.progress { display: block; background: #fff3cd; color: #856404; }

    .settings-toggle {
      font-size: 11px;
      color: #6c757d;
      cursor: pointer;
      text-align: right;
      margin-top: 8px;
    }
    .settings-toggle:hover { color: #4a6cf7; }

    .settings-panel {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 6px;
    }
    .settings-panel.open { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">🎵</span>
    <h2>音频 → Joplin 笔记</h2>
  </div>

  <label>Joplin 笔记本路径</label>
  <input type="text" id="joplinPath" placeholder="例: Project/stock/直播">

  <label>笔记标题</label>
  <input type="text" id="noteTitle" placeholder="页面标题将自动填充">

  <label>检测到的音频链接</label>
  <div id="urlList" class="url-list">
    <div class="url-empty">🔍 正在扫描...</div>
  </div>

  <button class="btn" id="sendBtn">📤 发送到后端处理</button>
  <div id="status"></div>

  <div class="settings-toggle" id="settingsToggle">⚙️ 后端设置</div>
  <div class="settings-panel" id="settingsPanel">
    <label>后端地址</label>
    <input type="text" id="backendUrl" value="http://localhost:8000">
  </div>

  <script src="popup.js"></script>
</body>
</html>
